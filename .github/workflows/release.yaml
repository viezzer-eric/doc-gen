name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Build & Publish
        run: dotnet publish src/DocGen.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true --output ./dist
        
      - name: List dist
        shell: bash
        run: ls -la ./dist
        
      - name: Prepare artifact
        shell: bash
        run: |
          cd ./dist
          # Detecta o executável (prioriza .exe no windows, ou qualquer binário no linux/mac)
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ARTIFACT_FILE=$(ls *.exe | head -n 1)
            TARGET_NAME="doc-gen-${{ matrix.rid }}.exe"
          else
            # Encontra o arquivo executável que não é um script nem dll
            ARTIFACT_FILE=$(find . -maxdepth 1 -type f -perm /111 ! -name "*.dll" ! -name "*.so" ! -name "*.dylib" | head -n 1 | sed 's|^\./||')
            TARGET_NAME="doc-gen-${{ matrix.rid }}"
          fi

          if [ -z "$ARTIFACT_FILE" ]; then
            echo "Erro: Nenhum executável encontrado em ./dist"
            ls -la
            exit 1
          fi

          mv "$ARTIFACT_FILE" "$TARGET_NAME"
          echo "ARTIFACT=$TARGET_NAME" >> $GITHUB_ENV
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doc-gen-${{ matrix.rid }}
          path: ./dist/${{ env.ARTIFACT }}

  push-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Pack Tool
        run: dotnet pack src/DocGen.csproj -c Release --output ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Binários para Linux, Windows e macOS" \
            ./artifacts/doc-gen-linux-x64/doc-gen-linux-x64 \
            ./artifacts/doc-gen-win-x64/doc-gen-win-x64.exe \
            ./artifacts/doc-gen-osx-x64/doc-gen-osx-x64