name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Build & Publish
        run: dotnet publish src/DocGen.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true --output ./dist
        
      - name: List dist
        shell: bash
        run: ls -la ./dist
        
      - name: Prepare artifact
        shell: bash
        run: |
          cd ./dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ARTIFACT_FILE=$(ls *.exe | head -n 1)
            TARGET_NAME="doc-gen-${{ matrix.rid }}.exe"
          else
            ARTIFACT_FILE=""
            for f in *; do
              if [ -f "$f" ] && [[ "$f" != *.dll && "$f" != *.so && "$f" != *.dylib ]]; then
                if [ -x "$f" ]; then
                  ARTIFACT_FILE="$f"
                  break
                fi
              fi
            done
            TARGET_NAME="doc-gen-${{ matrix.rid }}"
          fi

          if [ -z "$ARTIFACT_FILE" ]; then
            echo "Erro: Nenhum executável encontrado em ./dist"
            ls -la
            exit 1
          fi

          mv "$ARTIFACT_FILE" "$TARGET_NAME"
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x "$TARGET_NAME"
          fi
          echo "ARTIFACT=$TARGET_NAME" >> $GITHUB_ENV
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doc-gen-${{ matrix.rid }}
          path: ./dist/${{ env.ARTIFACT }}

  push-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Pack Tool
        run: dotnet pack src/DocGen.csproj -c Release --output ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tenta criar a release, se existir (erro), apenas faz o upload dos arquivos
          gh release upload ${{ github.ref_name }} \
            ./artifacts/doc-gen-linux-x64/doc-gen-linux-x64 \
            ./artifacts/doc-gen-win-x64/doc-gen-win-x64.exe \
            ./artifacts/doc-gen-osx-x64/doc-gen-osx-x64 \
            --clobber