name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: doc-gen-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact: doc-gen-win-x64.exe
          - os: macos-latest
            rid: osx-x64
            artifact: doc-gen-osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Build & Publish
        run: dotnet publish src/DocGen.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true --output ./dist
        
      - name: Rename Binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv ./dist/doc-gen.exe ./dist/${{ matrix.artifact }}
          else
            mv ./dist/doc-gen ./dist/${{ matrix.artifact }}
            chmod +x ./dist/${{ matrix.artifact }}
          fi
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./dist/${{ matrix.artifact }}

  push-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Pack Tool
        run: dotnet pack src/DocGen.csproj -c Release --output ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}" \
            ./artifacts/doc-gen-linux-x64/doc-gen-linux-x64 \
            ./artifacts/doc-gen-win-x64.exe/doc-gen-win-x64.exe \
            ./artifacts/doc-gen-osx-x64/doc-gen-osx-x64